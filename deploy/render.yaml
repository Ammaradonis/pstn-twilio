# Render.com blueprint for the API. This is a backup target if Fly is
# unavailable. Render supports Node + WebSockets and pins a stable URL.
#
# Apply via the Render dashboard or `render blueprint launch`.

services:
  - type: web
    name: pstn-twilio-api
    runtime: docker
    plan: starter
    dockerfilePath: ./deploy/api.Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: TWILIO_WEBHOOK_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_DEFAULT_COUNTRY
        value: US
